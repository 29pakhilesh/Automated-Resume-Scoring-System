# Render Blueprint: New → Blueprint → paste this repo URL.
# After deploy, set the Vercel build env VITE_API_BASE to this service's public URL (no trailing slash).

services:
  - type: web
    name: rss-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: PERSIST_SCORING_RUNS
        value: "false"
      - key: STORE_SCORING_SENSITIVE_CONTENT_IN_DB
        value: "false"
